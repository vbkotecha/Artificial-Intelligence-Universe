name: Sync GitHub Pages landing page

on:
  push:
    branches: [main]
    paths:
      - 'README.md'

permissions:
  contents: write

jobs:
  sync-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract stats from README and update landing page
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const readme = fs.readFileSync('README.md', 'utf8');
            const indexPath = 'docs/index.md';

            // Extract tool count: find patterns like "**800+** tools"
            const toolsMatch = readme.match(/\*\*(\d+\+)\*\*\s+tools/);
            const dirsMatch = readme.match(/\*\*(\d+\+)\*\*\s+AI directories/);
            const catsMatch = readme.match(/\*\*(\d+\+)\*\*\s+specialized categories/);
            const eduMatch = readme.match(/\*\*(\d+\+)\*\*\s+free educational resources/);

            const tools = toolsMatch ? toolsMatch[1] : '800+';
            const dirs = dirsMatch ? dirsMatch[1] : '130+';
            const cats = catsMatch ? catsMatch[1] : '50+';
            const edu = eduMatch ? eduMatch[1] : '25+';

            console.log(`Extracted stats: tools=${tools}, dirs=${dirs}, cats=${cats}, edu=${edu}`);

            let landing = fs.readFileSync(indexPath, 'utf8');

            // Update the stats table
            const statsTable = [
              '| | |',
              '|---|---|',
              `| 🛠️ Tools & resources | **${tools}** |`,
              `| 📂 Subdirectories referenced | **${dirs}** |`,
              `| 📁 Categories | **${cats}** |`,
              `| 📚 Free learning resources | **${edu}** |`,
            ].join('\n');

            // Replace the stats table section (between "Quick Stats" header and "Contributing" header)
            landing = landing.replace(
              /## Quick Stats\n\n\|[^#]+(?=## Contributing)/s,
              `## Quick Stats\n\n${statsTable}\n\n`
            );

            if (landing === fs.readFileSync(indexPath, 'utf8')) {
              console.log('No changes needed in docs/index.md.');
            } else {
              fs.writeFileSync(indexPath, landing, 'utf8');
              console.log('Updated docs/index.md with latest stats.');
            }

      - name: Commit updated landing page
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto-sync landing page stats from README'
          file_pattern: 'docs/index.md'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
