name: Welcome first-time contributors

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            👋 **Welcome to the Artificial Intelligence Universe!** Thank you for your first pull request — we're excited to have you here.

            Before we review, please make sure your entry follows the **[entry format spec](https://github.com/frangelbarrera/Artificial-Intelligence-Universe/blob/main/CONTRIBUTING.md#entry-format-specification)**:

            ✅ Exact format: `- **[Tool Name](URL)**: Description.`
            ✅ **LF line endings** (not CRLF) — check your editor's status bar
            ✅ No UTM, referral, or tracking parameters in URLs
            ✅ Description ≤120 characters, ending with a period
            ✅ One tool per PR

            Full checklist in the **[Contributing Guide](https://github.com/frangelbarrera/Artificial-Intelligence-Universe/blob/main/CONTRIBUTING.md#pull-request-checklist)**.

            If anything is unclear, drop a comment and we'll help out. Happy contributing! 🚀

          issue-message: |
            👋 **Welcome to the Artificial Intelligence Universe!** Thank you for opening your first issue.

            A maintainer will review it — you can expect a response **within 7 days**.

            💬 For general questions or discussions, you might prefer our **[Discussions](https://github.com/frangelbarrera/Artificial-Intelligence-Universe/discussions)** tab, where the community can weigh in.

            Thanks for helping improve the catalog! 🌌
